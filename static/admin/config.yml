backend:
  name: git-gateway
  branch: main
  site_domain: loquacious-gaufre-8d45a3.netlify.app

publish_mode: editorial_workflow

media_folder: static/media
public_folder: /media

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home
        file: content/_index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }

      - name: about
        label: About Us
        file: content/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }

      - name: committees
        label: Committees
        file: content/committees.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }

      - name: safety
