          - { label: Content, name: body, widget: markdown }

      - name: membership
        label: Membership
        file: content/membership.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Content, name: body, widget: markdown }

      - name: film
        label: Filming in Victoria Park
        file: content/film.md
        fields:
